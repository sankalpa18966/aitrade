version: '3.8'

services:
  forex_ai:
    build: .
    container_name: forex_ai_bot
    restart: unless-stopped
    env_file:
      - .env
    # Keep the logs and news cache persistent on your host machine
    volumes:
      - ./seen_news.json:/app/seen_news.json
      - ./currency_scores.json:/app/currency_scores.json
      - ./errors.log:/app/errors.log
