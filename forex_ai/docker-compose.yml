version: '3.8'

services:
  trading-bot:
    build: .
    container_name: bandafx-ai-bot
    restart: unless-stopped
    volumes:
      # Mount the trades.db file to host so DB doesn't reset when container restarts
      - ./trades.db:/app/trades.db
      - ./errors.log:/app/errors.log
    environment:
      - TZ=UTC
